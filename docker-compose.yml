services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cover
      POSTGRES_PASSWORD: cover
      POSTGRES_DB: cover
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cover"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
